version: "2"
sql:
  - engine: "postgresql"
    queries: "sqlc/query.sql"
    schema: "migrations/"
    gen:
      go:
        package: "queries"
        out: "internal/db/queries"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
